# netlify.toml — Pets & Coffee (petsncoffee.com)
# Static site — no build step required

[build]
  publish = "."

# ============================================================
# SECURITY HEADERS
# Applied to all pages
# ============================================================
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"

    # Prevent MIME type sniffing
    X-Content-Type-Options = "nosniff"

    # Referrer policy — sends origin only on cross-origin requests
    Referrer-Policy = "strict-origin-when-cross-origin"

    # HSTS — 1 year, include subdomains, eligible for preload list
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

    # Lock down sensitive browser permissions
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"

    # CSP starter — allows Google Fonts, Plausible, Kit embeds
    # NOTE: Tighten after Kit embed code is confirmed (Kit may require additional origins)
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://plausible.io https://f.convertkit.com https://js.kit.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://plausible.io https://api.kit.com; frame-src 'none'; object-src 'none'; base-uri 'self';"

# ============================================================
# CACHE-CONTROL
# Immutable assets get long cache; HTML never cached
# ============================================================
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/style.css"
  [headers.values]
    Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

# ============================================================
# REDIRECTS
# www to apex (301 permanent)
# ============================================================
[[redirects]]
  from = "https://www.petsncoffee.com/*"
  to   = "https://petsncoffee.com/:splat"
  status = 301
  force  = true

